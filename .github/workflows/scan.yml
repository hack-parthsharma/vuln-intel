name: NVD Vulnerability Scan

on:
  schedule:
    - cron: '30 3 * * *'  # Runs daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:       # Manual trigger button

# Optional: opt Actions into Node 24 now to silence Node 20 deprecation warnings
# (You can remove this later once Node 24 becomes the default on GitHub runners)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run NVD Scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          echo "🛡️ Starting NVD vulnerability scan..."
          
          # Date range: last 24 hours (UTC)
          END_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          START_DATE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          echo "Scanning from $START_DATE to $END_DATE"

          fetch_window () {
            local label="$1"  # "pub" or "lastMod"
            local START_INDEX=0
            local PAGE_SIZE=200
            local TOTAL=0

            while true; do
              URL="https://services.nvd.nist.gov/rest/json/cves/2.0?${label}StartDate=${START_DATE}&${label}EndDate=${END_DATE}&startIndex=${START_INDEX}&resultsPerPage=${PAGE_SIZE}"
              echo "[$label] Fetching offset $START_INDEX…"
              echo "[$label] URL: $URL"

              if [ -n "$NVD_API_KEY" ]; then
                RESPONSE=$(curl -sS -H "apiKey: $NVD_API_KEY" "$URL")
              else
                RESPONSE=$(curl -sS "$URL")
              fi

              # Validate JSON
              if ! echo "$RESPONSE" | python3 - <<'PY' 2>/dev/null
import sys, json; json.load(sys.stdin)
PY
              then
                echo "[$label] Invalid JSON, retrying in 10s…"
                sleep 10
                continue
              fi

              TOTAL=$(echo "$RESPONSE" | python3 - <<'PY'
import sys,json; print(json.load(sys.stdin).get('totalResults',0))
PY
)
              ITEMS=$(echo "$RESPONSE" | python3 - <<'PY'
import sys,json; print(len(json.load(sys.stdin).get('vulnerabilities',[])))
PY
)
              echo "[$label] Got $ITEMS items (total so far: $TOTAL)"

              # Save this page
              echo "$RESPONSE" > "/tmp/nvd_${label}_page_${START_INDEX}.json"

              START_INDEX=$((START_INDEX + PAGE_SIZE))
              if [ "$START_INDEX" -ge "$TOTAL" ] || [ "$ITEMS" -eq 0 ]; then
                break
              fi

              # Rate limit: with API key we can be faster; without, be conservative
              if [ -n "$NVD_API_KEY" ]; then
                sleep 1
              else
                sleep 7
              fi
            done
          }

          # Pass 1: published in last 24h
          fetch_window "pub"
          # Pass 2: modified in last 24h (helps catch late-enriched records)
          fetch_window "lastMod"

          echo "Fetched all pages. Processing..."

      - name: Process and Match Products
