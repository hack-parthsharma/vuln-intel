name: NVD Vulnerability Scan

on:
  schedule:
    - cron: '30 3 * * *'  # Runs daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:       # Manual trigger button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run NVD Scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "🛡️ Starting NVD vulnerability scan..."
          
          # Date range: last 24 hours
          END_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          START_DATE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          
          echo "Scanning from $START_DATE to $END_DATE"
          
          # Fetch all CVEs from last 24h
          ALL_CVES="[]"
          START_INDEX=0
          PAGE_SIZE=200
          TOTAL=0
          
          while true; do
            URL="https://services.nvd.nist.gov/rest/json/cves/2.0?pubStartDate=${START_DATE}&pubEndDate=${END_DATE}&startIndex=${START_INDEX}&resultsPerPage=${PAGE_SIZE}"
            
            echo "Fetching offset $START_INDEX..."
            
            if [ -n "$NVD_API_KEY" ]; then
              RESPONSE=$(curl -s -H "apiKey: $NVD_API_KEY" "$URL")
            else
              RESPONSE=$(curl -s "$URL")
            fi
            
            # Check if response is valid JSON
            if ! echo "$RESPONSE" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
              echo "Invalid response, retrying in 10s..."
              sleep 10
              continue
            fi
            
            TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalResults',0))")
            ITEMS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('vulnerabilities',[])))")
            
            echo "Got $ITEMS items (total: $TOTAL)"
            
            # Save this page
            echo "$RESPONSE" > "/tmp/nvd_page_${START_INDEX}.json"
            
            START_INDEX=$((START_INDEX + PAGE_SIZE))
            if [ "$START_INDEX" -ge "$TOTAL" ] || [ "$ITEMS" -eq 0 ]; then
              break
            fi
            
            # Rate limit
            if [ -n "$NVD_API_KEY" ]; then
              sleep 1
            else
              sleep 7
            fi
          done
          
          echo "Fetched all pages. Processing..."

      - name: Process and Match Products
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json, glob, os
          from datetime import datetime
          
          KEYWORDS = {
            "Cisco Nexus": ["cisco nexus","nexus 5500","nexus 9000","nx-os"],
            "Cisco UCS": ["cisco ucs","ucs fabric","fxos","unified computing"],
            "Cisco Fabric Extender": ["fabric extender","fex-2"],
            "SonicWall": ["sonicwall","sma 1000","sma 8200","nsa 5600","nsa 4600","sonicos"],
            "Fortigate/FortiOS": ["fortigate","fortios","fortinet","fortiproxy"],
            "Windows Server 2012 R2": ["windows server 2012"],
            "Windows 10": ["windows 10","windows_10"],
            "VMware ESXi": ["vmware esxi","vsphere","esxi 6."],
            "VMware vCenter": ["vcenter","vmware vcenter"],
            "Google Chrome": ["google chrome","chromium"],
            "Mozilla Firefox": ["firefox","mozilla firefox"],
            "Microsoft Edge": ["microsoft edge"],
            "PostgreSQL": ["postgresql","postgres"],
            "MySQL": ["mysql"],
            "MSSQL": ["sql server","mssql","microsoft sql"],
            "MongoDB": ["mongodb"],
            "Redis": ["redis"],
            "Elasticsearch": ["elasticsearch"],
            "RabbitMQ": ["rabbitmq"],
            "Apache HTTP Server": ["apache http","httpd","apache/2."],
            "Apache Tomcat": ["apache tomcat","tomcat"],
            "Node.js": ["node.js","nodejs"],
            "WordPress": ["wordpress","wp-"],
            "OpenSSL": ["openssl"],
            "Samba": ["samba"],
            "cPanel": ["cpanel"],
            "ESET": ["eset"],
            "Cortex XDR": ["cortex xdr","palo alto cortex"],
            "Imperva": ["imperva","incapsula"],
            "Adobe Acrobat": ["adobe acrobat","acrobat reader","acrobat dc"],
            "Adobe Photoshop": ["adobe photoshop"],
            "Microsoft Office": ["microsoft office","microsoft 365","office 365"],
            "Zoom": ["zoom video","zoom client","zoom workplace"],
            "Slack": ["slack"],
            "Grafana": ["grafana"],
            "Kibana": ["kibana"],
            "Prometheus": ["prometheus"],
            "Graylog": ["graylog"],
            "SolarWinds": ["solarwinds","ipmonitor"],
            "Hikvision": ["hikvision"],
            "ManageEngine": ["manageengine","desktop central"],
            "Oracle Java": ["oracle java","jdk","jre "],
            "Visual Studio": ["visual studio"],
            "Notepad++": ["notepad++"],
            "SonarQube": ["sonarqube"],
            "Ubiquiti/UniFi": ["ubiquiti","unifi"],
            "JumpCloud": ["jumpcloud"],
            "SplashTop": ["splashtop"],
            "Jamf Protect": ["jamf"],
            "Fluentd": ["fluentd"],
            "Nitro PDF": ["nitro pdf","nitro pro"],
            "Zendesk": ["zendesk"],
            "PgBouncer": ["pgbouncer"],
            "Securden": ["securden"],
            "Mmonit": ["mmonit","m/monit"],
            "Rebex": ["rebex"],
            "SecurEnvoy": ["securenvoy"],
            "Cato Networks": ["cato networks","cato client"],
            "ShareX": ["sharex"],
            "Gliffy": ["gliffy"],
            "IBM Notes": ["ibm notes","lotus notes","hcl notes"],
            "Burp Suite": ["burp suite","portswigger"],
            "KnowBe4": ["knowbe4"],
            "TFS / Azure DevOps": ["team foundation server","tfs 2018","azure devops server"],
            "Yoast SEO": ["yoast"],
            "Advanced Custom Fields": ["advanced custom fields","acf pro"],
            "Dell SonicWall": ["dell sonicwall","dell nsa"],
            "ipSentry": ["ipsentry"],
          }
          
          def match_products(text):
              lower = (text or "").lower()
              matched = []
              for name, kws in KEYWORDS.items():
                  for kw in kws:
                      if kw in lower:
                          matched.append(name)
                          break
              return matched
          
          def get_cvss(vuln):
              metrics = vuln.get("cve",{}).get("metrics",{})
              for key in ["cvssMetricV31","cvssMetricV30"]:
                  if metrics.get(key):
                      d = metrics[key][0]["cvssData"]
                      return {"score":d["baseScore"],"vector":d.get("vectorString"),"severity":d.get("baseSeverity","UNKNOWN")}
              if metrics.get("cvssMetricV2"):
                  d = metrics["cvssMetricV2"][0]["cvssData"]
                  s = d["baseScore"]
                  return {"score":s,"vector":d.get("vectorString"),"severity":"HIGH" if s>=7 else "MEDIUM" if s>=4 else "LOW"}
              return {"score":None,"vector":None,"severity":"UNKNOWN"}
          
          def assign_tier(cvss, desc):
              d = (desc or "").lower()
              rce = "remote code execution" in d or "rce" in d or "arbitrary code" in d
              unauth = "unauthenticated" in d or "without authentication" in d
              kev = "exploited in the wild" in d
              if kev or (rce and unauth) or (cvss["score"] and cvss["score"] >= 9.5): return 0
              if rce or (cvss["score"] and cvss["score"] >= 8.0): return 1
              if cvss["score"] and cvss["score"] >= 5.0: return 2
              return 3
          
          # Load all pages
          all_vulns = []
          for f in sorted(glob.glob("/tmp/nvd_page_*.json")):
              with open(f) as fh:
                  data = json.load(fh)
                  for item in data.get("vulnerabilities",[]):
                      descs = item.get("cve",{}).get("descriptions",[])
                      en = next((d["value"] for d in descs if d["lang"]=="en"), descs[0]["value"] if descs else "")
                      matched = match_products(en)
                      # Also check CPE
                      for config in item.get("cve",{}).get("configurations",[]):
                          for node in config.get("nodes",[]):
                              for cpe in node.get("cpeMatch",[]):
                                  uri = (cpe.get("criteria","")).lower()
                                  for name, kws in KEYWORDS.items():
                                      for kw in kws:
                                          if kw.replace(" ","") in uri.replace(" ","") and name not in matched:
                                              matched.append(name)
                      if matched:
                          cvss = get_cvss(item)
                          refs = [r["url"] for r in item.get("cve",{}).get("references",[])[:5]]
                          all_vulns.append({
                              "id": item.get("cve",{}).get("id","UNKNOWN"),
                              "description": en[:500],
                              "cvss": cvss,
                              "tier": assign_tier(cvss, en),
                              "matchedProducts": matched,
                              "references": refs,
                              "published": item.get("cve",{}).get("published",""),
                          })
          
          # Sort
          all_vulns.sort(key=lambda v: (v["tier"], -(v["cvss"]["score"] or 0)))
          
          # Build output
          result = {
              "scanTime": datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "totalMatched": len(all_vulns),
              "tierCounts": {str(t): len([v for v in all_vulns if v["tier"]==t]) for t in range(4)},
              "vulnerabilities": all_vulns,
          }
          
          with open("scan-results.json", "w") as f:
              json.dump(result, f, indent=2)
          
          print(f"✅ Found {len(all_vulns)} matching vulnerabilities")
          for t in range(4):
              c = len([v for v in all_vulns if v["tier"]==t])
              if c: print(f"   Tier {t}: {c}")
          PYTHON_SCRIPT

      - name: Commit Results
        run: |
          git config user.name "VULN INTEL Bot"
          git config user.email "vulnbot@users.noreply.github.com"
          git add scan-results.json
          git diff --cached --quiet || git commit -m "🛡️ Scan $(date -u +%Y-%m-%d) — $(python3 -c 'import json;d=json.load(open("scan-results.json"));print(d["totalMatched"])') CVEs found"
          git push
