name: NVD Vulnerability Scan

on:
  schedule:
    - cron: '30 3 * * *'  # Runs daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:       # Manual trigger button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run NVD Scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "🛡️ Starting NVD vulnerability scan..."
          
          # Date range: last 24 hours
          END_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          START_DATE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%S.000%%2B00:00")
          
          echo "Scanning from $START_DATE to $END_DATE"
          
          # Fetch all CVEs from last 24h
          ALL_CVES="[]"
          START_INDEX=0
          PAGE_SIZE=200
          TOTAL=0
          
          while true; do
            URL="https://services.nvd.nist.gov/rest/json/cves/2.0?pubStartDate=${START_DATE}&pubEndDate=${END_DATE}&startIndex=${START_INDEX}&resultsPerPage=${PAGE_SIZE}"
            
            echo "Fetching offset $START_INDEX..."
            
            if [ -n "$NVD_API_KEY" ]; then
              RESPONSE=$(curl -s -H "apiKey: $NVD_API_KEY" "$URL")
            else
              RESPONSE=$(curl -s "$URL")
            fi
            
            # Check if response is valid JSON
            if ! echo "$RESPONSE" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
              echo "Invalid response, retrying in 10s..."
              sleep 10
              continue
            fi
            
            TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalResults',0))")
            ITEMS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('vulnerabilities',[])))")
            
            echo "Got $ITEMS items (total: $TOTAL)"
            
            # Save this page
            echo "$RESPONSE" > "/tmp/nvd_page_${START_INDEX}.json"
            
            START_INDEX=$((START_INDEX + PAGE_SIZE))
            if [ "$START_INDEX" -ge "$TOTAL" ] || [ "$ITEMS" -eq 0 ]; then
              break
            fi
            
            # Rate limit
            if [ -n "$NVD_API_KEY" ]; then
              sleep 1
            else
              sleep 7
            fi
          done
          
          echo "Fetched all pages. Processing..."

      - name: Process and Match Products
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json, glob, os
          from datetime import datetime
          
          KEYWORDS = {
            # ===== NETWORK / FIREWALL / SECURITY APPLIANCES =====
            "Cisco Nexus": ["cisco nexus","nexus 5500","nexus 9000","nx-os"],
            "Cisco UCS": ["cisco ucs","ucs fabric","fxos","unified computing"],
            "Cisco Fabric Extender": ["fabric extender","fex-2"],
            "SonicWall": ["sonicwall","sma 1000","sma 8200","nsa 5600","nsa 4600","sonicos"],
            "Dell SonicWall": ["dell sonicwall","dell nsa"],
            "Fortigate/FortiOS": ["fortigate","fortios","fortinet","fortiproxy"],
            "Barracuda": ["barracuda"],
            "Windows Server 2012 R2": ["windows server 2012"],
            "Windows 10": ["windows 10","windows_10"],
            "Ubuntu": ["ubuntu"],
            "Google Chrome": ["google chrome","chromium"],
            "Mozilla Firefox": ["firefox","mozilla firefox"],
            "Microsoft Edge": ["microsoft edge","edge webview2"],
            "PostgreSQL": ["postgresql","postgres","postgresql-14"],
            "MySQL": ["mysql","mysql workbench"],
            "MSSQL": ["sql server","mssql","microsoft sql"],
            "MongoDB": ["mongodb"],
            "Redis": ["redis","redisinsight"],
            "Elasticsearch": ["elasticsearch"],
            "OpenSearch": ["opensearch","open search"],
            "OpenSSL": ["OpenSSL","openssl"],
            "PgBouncer": ["pgbouncer"],
            "pgAdmin": ["pgadmin"],
            "pgBadger": ["pgbadger"],
            "RabbitMQ": ["rabbitmq","rabbitmq-server"],
            "Erlang/OTP": ["erlang","erlang/otp","erlang otp"],
            "Apache HTTP Server": ["apache http","httpd","apache/2.","apache2"],
            "Apache Tomcat": ["apache tomcat","tomcat"],
            "IIS": ["iis 10","iis url rewrite","iis express"],
            "Cerberus FTP Server": ["cerberus ftp"],
            "hMailServer": ["hmailserver"],
            "ONLYOFFICE": ["onlyoffice"],
            "Nginx": ["nginx"],
            "Node.js": ["node.js","nodejs"],
            "Python": ["python 3.","python launcher","python 2."],
            "OpenJDK": ["openjdk","open jdk","hotspot"],
            "Oracle Java": ["oracle java","jdk","jre ","java se development kit","java 8 update"],
            "Microsoft .NET": ["microsoft .net","asp.net","dotnet",".net framework",".net runtime",".net sdk"],
            "PowerShell": ["powershell"],
            "VMware ESXi": ["vmware esxi","vsphere","esxi 6."],
            "VMware vCenter": ["vcenter","vmware vcenter"],
            "VMware Tools": ["vmware tools"],
            "Grafana": ["grafana"],
            "Kibana": ["kibana"],
            "Prometheus": ["prometheus","node_exporter","windows_exporter"],
            "Graylog": ["graylog-server","graylog server"],
            "Graylog Sidecar": ["graylog-sidecar","graylog sidecar"],
            "SolarWinds": ["solarwinds","ipmonitor"],
            "PRTG Network Monitor": ["prtg","paessler"],
            "Site24x7": ["site24x7"],
            "Fluentd": ["fluentd","td-agent"],
            "Filebeat": ["filebeat"],
            "Logstash": ["logstash"],
            "Monit": ["mmonit"],
            "sysstat": ["sysstat"],
            "ESET": ["eset"],
            "Cortex XDR": ["cortex xdr","palo alto cortex","Broker VM"],
            "Imperva": ["imperva","incapsula"],
            "Tenable Nessus": ["tenable nessus","nessus"],
            "KnowBe4": ["knowbe4"],
            "Securden": ["securden"],
            "SecurEnvoy": ["securenvoy"],
            "VeraCrypt": ["veracrypt"],
            "KeePass/KeeWeb": ["keepass","keeweb"],
            "Windows Defender": ["windows defender"],
            "Npcap": ["npcap"],
            "OpenSSL": ["openssl"],
            "PuTTY": ["putty"],
            "WinSCP": ["winscp"],
            "XRDP": ["xrdp"],
            "SplashTop": ["splashtop"],
            "JumpCloud": ["jumpcloud"],
            "Microsoft Office": ["microsoft office","microsoft 365","office 365","office ltsc","office professional"],
            "Adobe Acrobat": ["adobe acrobat","acrobat reader","acrobat dc"],
            "Adobe Photoshop": ["adobe photoshop"],
            "Adobe Creative Cloud": ["adobe creative cloud","adobe robohelp"],
            "LibreOffice": ["libreoffice"],
            "Zoom": ["zoom video","zoom client","zoom workplace"],
            "Slack": ["slack"],
            "Postman": ["postman"],
            "WordPress": ["wordpress","wp-"],
            "Yoast SEO": ["yoast"],
            "Advanced Custom Fields": ["advanced custom fields","acf pro"],
            "Zendesk": ["zendesk"],
            "SupportPal": ["supportpal"],
            "FormTools": ["form tools","formtools"],
            "Visual Studio": ["visual studio"],
            "Visual Studio Code": ["visual studio code","vs code","vscode"],
            "Notepad++": ["notepad++"],
            "SonarQube": ["sonarqube"],
            "Git": ["git for windows","git version"],
            "PyCharm": ["pycharm"],
            "Burp Suite": ["burp suite","portswigger"],
            "WinMerge": ["winmerge"],
            "Ansible": ["ansible"],
            "Certbot": ["certbot","let's encrypt","letsencrypt"],
            "Microsoft Azure AD Connect": ["azure ad connect","entra connect"],
            "Veeam": ["veeam"],
            "Landscape Server": ["landscape-server","landscape server","canonical landscape"],
            "TFS / Azure DevOps": ["team foundation server","tfs 2018","azure devops server"],
            "7-Zip": ["7-zip","7zip"],
            "WinRAR": ["winrar"],
            "WinZip": ["winzip"],
            "FileZilla": ["filezilla"],
            "Ubiquiti/UniFi": ["ubiquiti","unifi"],
            "Cato Networks": ["cato networks","cato client"],
            "OpenSSH": ["openssh"],
            "Chrony": ["chrony"],
            "NFS": ["nfs-common","nfs-kernel-server","nfs server"],
            "CIFS/SMB Utils": ["cifs-utils","cifs utils"],
            "LVM2": ["lvm2"],
            "Samba": ["samba"],
            "Hikvision": ["hikvision"],
            "SQLBackupAndFTP": ["sqlbackupandftp"],
            "Jamf Protect": ["jamf"],
            "Nitro PDF": ["nitro pdf","nitro pro"],
            "CutePDF": ["cutepdf"],
            "TIFF Image Printer": ["tiff image printer"],
            "Informatik PDF": ["informatik"],
            "AccessData FTK": ["accessdata","ftk imager"],
            "Concordance": ["concordance"],
            "dtSearch": ["dtsearch"],
            "Passware Kit": ["passware"],
            "NVIDIA CUDA": ["nvidia cuda","cudnn","nvidia graphics driver","nvidia nsight","nvidia rtx"],
            "cPanel": ["cpanel"],
            "ManageEngine": ["manageengine","desktop central"],
            "Mmonit": ["mmonit","m/monit"],
            "Rebex": ["rebex"],
            "ShareX": ["sharex"],
            "Gliffy": ["gliffy"],
            "IBM Notes": ["ibm notes","lotus notes","hcl notes"],
            "ipSentry": ["ipsentry"],
            "GParted": ["gparted"],
            "Fio": ["fio benchmark","fio "],
            "ncdu": ["ncdu"],
            "iotop": ["iotop"],
            "PDQ Deploy/Inventory": ["pdq deploy","pdq inventory"],
            "TreeSize": ["treesize"],
            "IrfanView": ["irfanview"],
            "Process Hacker": ["process hacker"],
            "RVTools": ["rvtools"],
            "MATE Desktop": ["mate-desktop","mate desktop"],
            "eDrawings": ["edrawings"],
            "DigiCert": ["digicert"],
            "Laserfiche": ["laserfiche"],
            "SAP Crystal Reports": ["crystal reports","sap crystal"],
            "n2pdf": ["n2pdf"],
            "Bvckup": ["bvckup"],
          }
          
          def match_products(text):
              lower = (text or "").lower()
              matched = []
              for name, kws in KEYWORDS.items():
                  for kw in kws:
                      if kw in lower:
                          matched.append(name)
                          break
              return matched
          
          def get_cvss(vuln):
              metrics = vuln.get("cve",{}).get("metrics",{})
              for key in ["cvssMetricV31","cvssMetricV30"]:
                  if metrics.get(key):
                      d = metrics[key][0]["cvssData"]
                      return {"score":d["baseScore"],"vector":d.get("vectorString"),"severity":d.get("baseSeverity","UNKNOWN")}
              if metrics.get("cvssMetricV2"):
                  d = metrics["cvssMetricV2"][0]["cvssData"]
                  s = d["baseScore"]
                  return {"score":s,"vector":d.get("vectorString"),"severity":"HIGH" if s>=7 else "MEDIUM" if s>=4 else "LOW"}
              return {"score":None,"vector":None,"severity":"UNKNOWN"}
          
          def assign_tier(cvss, desc):
              d = (desc or "").lower()
              rce = "remote code execution" in d or "rce" in d or "arbitrary code" in d
              unauth = "unauthenticated" in d or "without authentication" in d
              kev = "exploited in the wild" in d
              if kev or (rce and unauth) or (cvss["score"] and cvss["score"] >= 9.5): return 0
              if rce or (cvss["score"] and cvss["score"] >= 8.0): return 1
              if cvss["score"] and cvss["score"] >= 5.0: return 2
              return 3
          
          # Load all pages
          all_vulns = []
          for f in sorted(glob.glob("/tmp/nvd_page_*.json")):
              with open(f) as fh:
                  data = json.load(fh)
                  for item in data.get("vulnerabilities",[]):
                      descs = item.get("cve",{}).get("descriptions",[])
                      en = next((d["value"] for d in descs if d["lang"]=="en"), descs[0]["value"] if descs else "")
                      matched = match_products(en)
                      for config in item.get("cve",{}).get("configurations",[]):
                          for node in config.get("nodes",[]):
                              for cpe in node.get("cpeMatch",[]):
                                  uri = (cpe.get("criteria","")).lower()
                                  for name, kws in KEYWORDS.items():
                                      for kw in kws:
                                          if kw.replace(" ","") in uri.replace(" ","") and name not in matched:
                                              matched.append(name)
                      if matched:
                          cvss = get_cvss(item)
                          refs = [r["url"] for r in item.get("cve",{}).get("references",[])[:5]]
                          all_vulns.append({
                              "id": item.get("cve",{}).get("id","UNKNOWN"),
                              "description": en[:500],
                              "cvss": cvss,
                              "tier": assign_tier(cvss, en),
                              "matchedProducts": matched,
                              "references": refs,
                              "published": item.get("cve",{}).get("published",""),
                          })
          
          all_vulns.sort(key=lambda v: (v["tier"], -(v["cvss"]["score"] or 0)))
          
          product_count = len(KEYWORDS)
          result = {
              "scanTime": datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "totalMatched": len(all_vulns),
              "productsMonitored": product_count,
              "tierCounts": {str(t): len([v for v in all_vulns if v["tier"]==t]) for t in range(4)},
              "vulnerabilities": all_vulns,
          }
          
          with open("scan-results.json", "w") as f:
              json.dump(result, f, indent=2)
          
          print(f"✅ Found {len(all_vulns)} matching vulnerabilities ({product_count} products monitored)")
          for t in range(4):
              c = len([v for v in all_vulns if v["tier"]==t])
              if c: print(f"   Tier {t}: {c}")
          PYTHON_SCRIPT

      - name: Commit Results
        run: |
          git config user.name "VULN INTEL Bot"
          git config user.email "vulnbot@users.noreply.github.com"
          git add scan-results.json
          git diff --cached --quiet || git commit -m "🛡️ Scan $(date -u +%Y-%m-%d) — $(python3 -c 'import json;d=json.load(open("scan-results.json"));print(d["totalMatched"])') CVEs found"
          git push

      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python3 << 'TEAMS_SCRIPT'
          import json, os, urllib.request
          from datetime import datetime, timezone

          # Load scan results
          with open("scan-results.json") as f:
              data = json.load(f)

          vulns = data.get("vulnerabilities", [])
          scan_time = data.get("scanTime", "Unknown")
          total = data.get("totalMatched", 0)
          tiers = data.get("tierCounts", {})
          products_monitored = data.get("productsMonitored", "120+")

          WEBHOOK_URL = os.environ.get("TEAMS_WEBHOOK_URL", "")

          if not WEBHOOK_URL:
              print("⚠️ TEAMS_WEBHOOK_URL not set, skipping notification")
              exit(0)

          # ── Build summary text ──
          tier_names = {"0": "🔴 Emergency", "1": "🟠 High", "2": "🟡 Medium", "3": "🟢 Low"}
          products_affected = len(set(p for v in vulns for p in v.get("matchedProducts", [])))

          # Build compact vulnerability list (top 10)
          vuln_lines = []
          for v in vulns[:10]:
              tier = v.get("tier", 3)
              score = v.get("cvss", {}).get("score")
              score_str = f"{score:.1f}" if score is not None else "N/A"
              products = ", ".join(v.get("matchedProducts", []))
              cve_id = v.get("id", "N/A")
              tier_emoji = ["🔴", "🟠", "🟡", "🟢"][tier] if tier < 4 else "⚪"
              desc = (v.get("description", ""))[:100]
              vuln_lines.append(f"{tier_emoji} **{cve_id}** (CVSS {score_str}) — {products}")
              vuln_lines.append(f"   {desc}...")
              vuln_lines.append("")

          vuln_text = "\n".join(vuln_lines) if vuln_lines else "No vulnerabilities found."

          # Action items
          action_lines = []
          for v in vulns[:5]:
              if v.get("tier", 3) <= 1:
                  score = v.get("cvss", {}).get("score")
                  score_str = f"{score:.1f}" if score is not None else "N/A"
                  action_lines.append(f"- **{v['id']}** — {', '.join(v.get('matchedProducts',[]))} — CVSS {score_str}")

          action_text = "\n".join(action_lines) if action_lines else "- No Tier 0/1 vulnerabilities requiring immediate action."

          # Determine header
          if total == 0:
              header_text = "✅ VULN INTEL — All Clear"
          else:
              emergency = int(tiers.get("0", 0))
              high = int(tiers.get("1", 0))
              if emergency > 0:
                  header_text = f"🚨 VULN INTEL — {total} CVEs Found ({emergency} EMERGENCY)"
              elif high > 0:
                  header_text = f"⚠️ VULN INTEL — {total} CVEs Found ({high} HIGH)"
              else:
                  header_text = f"🛡️ VULN INTEL — {total} CVEs Found"

          # ── Build Adaptive Card (compact for Workflows webhook) ──
          card = {
              "type": "AdaptiveCard",
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "version": "1.4",
              "body": [
                  {
                      "type": "TextBlock",
                      "text": header_text,
                      "weight": "Bolder",
                      "size": "Large",
                      "wrap": True
                  },
                  {
                      "type": "TextBlock",
                      "text": f"📅 {scan_time} | {products_monitored} products monitored",
                      "size": "Small",
                      "isSubtle": True,
                      "spacing": "None"
                  },
                  {
                      "type": "ColumnSet",
                      "separator": True,
                      "spacing": "Medium",
                      "columns": [
                          {"type": "Column", "width": "1", "items": [
                              {"type": "TextBlock", "text": f"🔴 **{tiers.get('0', 0)}**\n\nEmergency", "horizontalAlignment": "Center", "wrap": True, "size": "Small"}
                          ]},
                          {"type": "Column", "width": "1", "items": [
                              {"type": "TextBlock", "text": f"🟠 **{tiers.get('1', 0)}**\n\nHigh", "horizontalAlignment": "Center", "wrap": True, "size": "Small"}
                          ]},
                          {"type": "Column", "width": "1", "items": [
                              {"type": "TextBlock", "text": f"🟡 **{tiers.get('2', 0)}**\n\nMedium", "horizontalAlignment": "Center", "wrap": True, "size": "Small"}
                          ]},
                          {"type": "Column", "width": "1", "items": [
                              {"type": "TextBlock", "text": f"🟢 **{tiers.get('3', 0)}**\n\nLow", "horizontalAlignment": "Center", "wrap": True, "size": "Small"}
                          ]}
                      ]
                  },
                  {
                      "type": "TextBlock",
                      "text": "**🎯 Immediate Action Required:**",
                      "spacing": "Medium",
                      "separator": True,
                      "wrap": True
                  },
                  {
                      "type": "TextBlock",
                      "text": action_text,
                      "wrap": True,
                      "size": "Small",
                      "spacing": "Small"
                  },
                  {
                      "type": "TextBlock",
                      "text": f"**📋 Top Vulnerabilities** ({min(len(vulns), 10)} of {total})",
                      "spacing": "Medium",
                      "separator": True,
                      "wrap": True
                  },
                  {
                      "type": "TextBlock",
                      "text": vuln_text,
                      "wrap": True,
                      "size": "Small",
                      "spacing": "Small"
                  },
                  {
                      "type": "TextBlock",
                      "text": "Sources: NVD (NIST) · CISA KEV · Vendor Advisories",
                      "size": "Small",
                      "isSubtle": True,
                      "spacing": "Medium",
                      "separator": True,
                      "wrap": True
                  }
              ]
          }

          # Workflows webhook format — just the Adaptive Card wrapped in attachments
          payload = {
              "type": "message",
              "attachments": [
                  {
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "contentUrl": None,
                      "content": card
                  }
              ]
          }

          payload_json = json.dumps(payload).encode("utf-8")
          print(f"📤 Sending payload ({len(payload_json)} bytes) to Teams...")

          req = urllib.request.Request(
              WEBHOOK_URL,
              data=payload_json,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  status = resp.getcode()
                  body = resp.read().decode("utf-8", errors="replace")
                  print(f"✅ Teams notification sent (HTTP {status})")
                  print(f"📨 Response body: {body[:500]}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"❌ Teams webhook failed: HTTP {e.code} — {body}")
              exit(1)
          except Exception as e:
              print(f"❌ Teams webhook failed: {e}")
              exit(1)
          TEAMS_SCRIPT
